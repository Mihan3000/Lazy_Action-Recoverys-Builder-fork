name: TeamWin [TWRP] Patch (NonSamsung)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
        - twrp-12.1
        - twrp-11
        - twrp-10.0-deprecated
        - twrp-9.0
        - twrp-8.1
        - twrp-7.1
      DEVICE_TREE:
        description: 'Custom Recovery Tree URL'
        required: true
        default: 'https://github.com/oliplusmzr/recovery_device_samsung_a24'
      DEVICE_TREE_BRANCH:
        description: 'Custom Recovery Tree Branch'
        required: true
        default: 'TWRP'
      BUILD_TARGET:
        description: 'Specify your Build Target'
        required: true
        default: 'recovery'
        type: choice
        options:
        - boot
        - recovery
        - vendorboot
      LDCHECK:
        description: 'Use LDCHECK'
        required: false
        default: false
        type: boolean
      LDCHECKPATH:
        description: 'Path of blobs to check'
        required: true
        default: 'system/bin/qseecomd'

jobs:
  build:
    name: Build TWRP by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4
      
    - name: Cleanup & Setup Space
      uses: rokibhasansagar/slimhub_actions@main
      
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Prepare Environment (Fixed Packages)
      run: |
        sudo apt update
        sudo apt -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev libtinfo5 libgflags-dev libncurses5 python3 python-is-python3

    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Install Git-Repo
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Check Manifest Branch & Set Env
      run: |
        if [ "${{ inputs.MANIFEST_BRANCH }}" == "twrp-11" ] || [ "${{ inputs.MANIFEST_BRANCH }}" == "twrp-12.1" ]; then
            echo "MANIFEST=https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git" >> $GITHUB_ENV
            echo "CHECK_LEGACY_BRANCH=false" >> $GITHUB_ENV
        else
            echo "MANIFEST=https://github.com/ColdWindScholar/platform_manifest_twrp_omni.git" >> $GITHUB_ENV
            echo "CHECK_LEGACY_BRANCH=true" >> $GITHUB_ENV
        fi

    - name: Initialize & Sync Repo
      run: |
        mkdir android-recovery && cd android-recovery
        git config --global user.name "lazycodebuilder"
        git config --global user.email "lazycodebuilder@users.noreply.github.com"
        repo init --depth=1 -u ${{ env.MANIFEST }} -b ${{ inputs.MANIFEST_BRANCH }}
        repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Clone Device Tree
      run: |
        cd android-recovery
        git clone ${{ inputs.DEVICE_TREE }} -b ${{ inputs.DEVICE_TREE_BRANCH }} ./device_tree
        echo "COMMIT_ID=$(cd device_tree && git rev-parse HEAD)" >> $GITHUB_ENV

    - name: Fix Potential Missing Folders (Log Errors Fix)
      run: |
        cd android-recovery
        # Eğer development klasörü eksik gelirse derleme patlamasın diye çekiyoruz
        if [ ! -d "development" ]; then
          git clone https://github.com/minimal-manifest-twrp/platform_development.git -b ${{ inputs.MANIFEST_BRANCH }} development
        fi

    - name: Process Device Tree & Move to Correct Path
      run: |
        cd android-recovery/device_tree
        # Kernel zip kontrolü
        if [ -f 'prebuilt/kernel.zip' ]; then
          unzip -p 'prebuilt/kernel.zip' 'kernel' > 'prebuilt/kernel'
        fi
        
        DEVICE_MAKEFILE=$(grep -r "PRODUCT_NAME" . | head -n 1 | cut -d "=" -f 2 | tr -d '[:space:]')
        DEVICE_BRAND=$(grep -r "PRODUCT_BRAND" . | head -n 1 | cut -d "=" -f 2 | tr -d '[:space:]')
        DEVICE_NAME=$(grep -r "PRODUCT_DEVICE" . | head -n 1 | cut -d "=" -f 2 | tr -d '[:space:]')
        
        DEVICE_BRAND=${DEVICE_BRAND:-generic}
        DEVICE_NAME=${DEVICE_NAME:-$DEVICE_MAKEFILE}
        
        echo "DEVICE_MAKEFILE=${DEVICE_MAKEFILE}" >> $GITHUB_ENV
        echo "DEVICE_NAME=${DEVICE_NAME}" >> $GITHUB_ENV
        echo "DEVICE_DIRECTORY=device/${DEVICE_BRAND}/${DEVICE_NAME}" >> $GITHUB_ENV
        
        cd ../
        mkdir -p "device/${DEVICE_BRAND}"
        mv device_tree "device/${DEVICE_BRAND}/${DEVICE_NAME}"

    - name: Installing Python2 for Legacy (Only if needed)
      if: env.CHECK_LEGACY_BRANCH == 'true'
      run: |
        sudo apt update
        sudo apt install -y python2
        sudo ln -sf /usr/bin/python2 /usr/bin/python

    - name: Building Image
      run: |
        cd android-recovery
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        # Lunch ve Build ayrılsın ki hata net görünsün
        lunch ${{ env.DEVICE_MAKEFILE }}-eng
        make ${{ inputs.BUILD_TARGET }}image -j$(nproc --all)

    - name: Prepare Artifacts
      run: |
        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV
        case "${{ inputs.BUILD_TARGET }}" in
          recovery) echo "BT_NAME=recovery" >> $GITHUB_ENV ;;
          boot) echo "BT_NAME=boot" >> $GITHUB_ENV ;;
          *) echo "BT_NAME=vendor_boot" >> $GITHUB_ENV ;;
        esac

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/${{ env.BT_NAME }}.img
          android-recovery/out/target/product/${{ env.DEVICE_NAME }}/*.zip
        name: TWRP for ${{ env.DEVICE_NAME }} - ${{ env.BUILD_DATE }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ inputs.MANIFEST_BRANCH }}
          Commit: ${{ env.COMMIT_ID }}
